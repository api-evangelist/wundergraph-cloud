# ---------------------------------------------------------------------------
# Input types
# ---------------------------------------------------------------------------

input LabelInput {
  key: String!
  value: String!
}

input PaginationInput {
  limit: Int
  offset: Int
}

input DateRangeInput {
  start: String!
  end: String!
}

input AnalyticsFilterInput {
  field: String!
  value: String
  operator: String!
}

input AnalyticsConfigInput {
  groupBy: String
}

input PublishSubgraphInput {
  name: String!
  schema: String!
}

input PersistedOperationInput {
  id: String!
  contents: String!
  operationNames: [String!]
}

input IntegrationConfigInput {
  slackWebhookURL: String
}

input OrganizationGroupRuleInput {
  resource: String!
  action: String!
  resourceType: String!
}

input IDPMapperInput {
  attribute: String!
  role: String!
}

input LintRuleInput {
  ruleName: String!
  severity: LintSeverity!
}

input GraphPruningRuleInput {
  ruleName: String!
  severity: LintSeverity!
  gracePeriodDays: Int
}

input NamespaceChecksConfigInput {
  skipTrafficCheck: Boolean
  trafficCheckDays: Int
  breakingChangesRetentionDays: Int
}

input ProposalSubgraphInput {
  name: String!
  schema: String!
  isDeleted: Boolean
  isNew: Boolean
}

input NamespaceProposalConfigInput {
  checkSeverityLevel: String
  publishSeverityLevel: String
  enableProposalChecks: Boolean
  namingConvention: ProposalNamingConvention
}

input SubgraphCheckExtensionsConfigInput {
  webhookURL: String
  webhookSecret: String
}

