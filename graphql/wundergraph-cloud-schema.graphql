# ---------------------------------------------------------------------------
# Query
# ---------------------------------------------------------------------------

type Query {
  """Returns the identity of the currently authenticated user."""
  whoAmI: WhoAmIUser!

  """Lists all organizations the authenticated user is a member of."""
  listOrganizations: [UserOrganization!]!

  """Returns a specific organization by its slug."""
  getOrganizationBySlug(slug: String!): UserOrganization

  """Returns the list of federated graphs in the organization."""
  getFederatedGraphs(
    namespace: String
    namespaceId: String
    limit: Int
    offset: Int
    includeMetrics: Boolean
    supportsFederation: Boolean
    query: String
    excludeContracts: Boolean
  ): [FederatedGraph!]!

  """Returns a federated graph by name and namespace."""
  getFederatedGraphByName(name: String!, namespace: String!): FederatedGraph

  """Returns a federated graph by its internal ID."""
  getFederatedGraphById(id: String!): FederatedGraph

  """Returns federated graphs that match specific subgraph labels."""
  getFederatedGraphsBySubgraphLabels(labels: [LabelInput!]!, namespace: String!): [FederatedGraph!]!

  """Returns the latest valid SDL of a federated graph by name."""
  getFederatedGraphSDLByName(name: String!, namespace: String!): String

  """Returns the SDL for a specific schema version of a federated graph."""
  getSdlBySchemaVersion(schemaVersionId: String!): String

  """Returns the changelog for a specific schema version."""
  getChangelogBySchemaVersion(schemaVersionId: String!): [FederatedGraphChangelog!]!

  """Returns the list of subgraphs in the organization."""
  getSubgraphs(
    namespace: String
    namespaceId: String
    limit: Int
    offset: Int
    labels: [LabelInput!]
    query: String
    excludeFeatureSubgraphs: Boolean
  ): [Subgraph!]!

  """Returns a subgraph by name and namespace."""
  getSubgraphByName(name: String!, namespace: String!): Subgraph

  """Returns a subgraph by its internal ID."""
  getSubgraphById(id: String!): Subgraph

  """Returns the SDL of a subgraph from the latest valid composition."""
  getSubgraphSDLFromLatestComposition(name: String!, namespace: String!, federatedGraphName: String!): String

  """Returns the latest published SDL of a subgraph."""
  getLatestSubgraphSDL(name: String!, namespace: String!): String

  """Returns schema checks for a federated graph."""
  getChecksByFederatedGraphName(
    graphName: String!
    namespace: String!
    limit: Int
    offset: Int
    startDate: String
    endDate: String
  ): [SchemaCheck!]!

  """Returns a summary of a specific schema check."""
  getCheckSummary(checkId: String!, graphName: String!, namespace: String!): GetCheckSummaryResult

  """Returns affected operations for a schema check."""
  getCheckOperations(checkId: String!, graphName: String!, namespace: String!): [CheckOperation!]!

  """Returns the body of a stored operation by its hash."""
  getOperationContent(hash: String!): String

  """Returns the changelog of a federated graph."""
  getFederatedGraphChangelog(
    graphName: String!
    namespace: String!
    pagination: PaginationInput
    dateRange: DateRangeInput
    schemaVersionId: String
  ): GetFederatedGraphChangelogResult!

  """Returns analytics view data for a federated graph."""
  getAnalyticsView(
    graphName: String!
    namespace: String!
    name: String!
    config: AnalyticsConfigInput
    dateRange: DateRangeInput
    pagination: PaginationInput
    filters: [AnalyticsFilterInput!]
    groupBy: String
  ): AnalyticsViewResult!

  """Returns dashboard analytics overview for a federated graph."""
  getDashboardAnalyticsView(
    graphName: String!
    namespace: String!
    dateRange: DateRangeInput
    filters: [AnalyticsFilterInput!]
  ): DashboardAnalyticsResult!

  """Returns a distributed trace by trace ID."""
  getTrace(traceId: String!, graphName: String!, namespace: String!): [Span!]!

  """Returns graph-level metrics for a federated graph."""
  getGraphMetrics(
    graphName: String!
    namespace: String!
    dateRange: DateRangeInput
    filters: [AnalyticsFilterInput!]
  ): GraphMetricsResult!

  """Returns error rate metrics for a federated graph."""
  getMetricsErrorRate(
    graphName: String!
    namespace: String!
    dateRange: DateRangeInput
    filters: [AnalyticsFilterInput!]
  ): MetricsErrorRateResult!

  """Returns subgraph-level metrics."""
  getSubgraphMetrics(
    subgraphName: String!
    namespace: String!
    dateRange: DateRangeInput
    filters: [AnalyticsFilterInput!]
  ): SubgraphMetrics!

  """Returns error rate metrics for a subgraph."""
  getSubgraphMetricsErrorRate(
    subgraphName: String!
    namespace: String!
    dateRange: DateRangeInput
    filters: [AnalyticsFilterInput!]
  ): MetricsErrorRateResult!

  """Returns field usage statistics for a federated graph."""
  getFieldUsage(
    graphName: String!
    namespace: String!
    namedType: String!
    fieldName: String!
    dateRange: DateRangeInput
    filters: [AnalyticsFilterInput!]
  ): FieldUsageResult!

  """Returns total request count for the organization."""
  getOrganizationRequestsCount(dateRange: DateRangeInput!): Int!

  """Returns operations for a graph namespace."""
  getOperations(
    graphName: String!
    namespace: String!
    dateRange: DateRangeInput
    filters: [AnalyticsFilterInput!]
    pagination: PaginationInput
    fetchBasedOn: OperationsFetchBasedOn
    clientName: String
    clientVersion: String
  ): [OperationEntry!]!

  """Returns client analytics for a graph."""
  getClientsFromAnalytics(
    graphName: String!
    namespace: String!
    dateRange: DateRangeInput
  ): [AnalyticsClient!]!

  """Returns clients that executed a specific operation."""
  getOperationClients(
    graphName: String!
    namespace: String!
    operationHash: String!
    dateRange: DateRangeInput
  ): [AnalyticsClient!]!

  """Returns deprecated fields used by a specific operation."""
  getOperationDeprecatedFields(
    graphName: String!
    namespace: String!
    operationHash: String!
  ): [DeprecatedField!]!

  """Returns organization members."""
  getOrganizationMembers(organizationSlug: String!): [OrgMember!]!

  """Returns pending organization invitations."""
  getPendingOrganizationMembers(organizationSlug: String!): [PendingOrgInvitation!]!

  """Returns whether the organization member limit has been reached."""
  isMemberLimitReached: Boolean!

  """Returns organization API keys."""
  getAPIKeys: [APIKey!]!

  """Returns router tokens for a federated graph."""
  getRouterTokens(graphName: String!, namespace: String!): [RouterToken!]!

  """Returns persisted operations for a client."""
  getPersistedOperations(federatedGraphId: String!, clientId: String!): [PersistedOperation!]!

  """Returns audit logs for the organization."""
  getAuditLogs(limit: Int, offset: Int, startDate: String, endDate: String): [AuditLog!]!

  """Returns organization webhook configurations."""
  getOrganizationWebhookConfigs: [OrganizationWebhookConfig!]!

  """Returns metadata about available webhook events."""
  getOrganizationWebhookMeta: WebhookMeta!

  """Returns webhook delivery history."""
  getOrganizationWebhookHistory(webhookId: String!, limit: Int, offset: Int): [WebhookDelivery!]!

  """Returns details of a specific webhook delivery."""
  getWebhookDeliveryDetails(deliveryId: String!): WebhookDelivery

  """Returns organization integrations (e.g. Slack)."""
  getOrganizationIntegrations: [Integration!]!

  """Returns organization groups (RBAC)."""
  getOrganizationGroups: [OrganizationGroup!]!

  """Returns members of an organization group."""
  getOrganizationGroupMembers(groupId: String!): [OrgMember!]!

  """Returns namespaces in the organization."""
  getNamespaces: [Namespace!]!

  """Returns a specific namespace."""
  getNamespace(name: String!): Namespace

  """Returns billing plans available."""
  getBillingPlans: [BillingPlan!]!

  """Returns compositions for a federated graph."""
  getCompositions(graphName: String!, namespace: String!, limit: Int, offset: Int): [Composition!]!

  """Returns details of a specific composition."""
  getCompositionDetails(compositionId: String!): CompositionDetails

  """Returns feature flags in a namespace."""
  getFeatureFlags(namespace: String!, limit: Int, offset: Int, query: String): [FeatureFlag!]!

  """Returns a feature flag by name."""
  getFeatureFlagByName(name: String!, namespace: String!): FeatureFlag

  """Returns feature subgraphs associated with a feature flag."""
  getFeatureSubgraphsByFeatureFlag(featureFlagName: String!, namespace: String!): [Subgraph!]!

  """Returns feature subgraphs in a namespace."""
  getFeatureSubgraphs(namespace: String!, limit: Int, offset: Int): [Subgraph!]!

  """Returns feature flags applicable to a federated graph."""
  getFeatureFlagsByFederatedGraph(graphName: String!, namespace: String!): [FeatureFlag!]!

  """Returns feature flags in the latest composition of a federated graph."""
  getFeatureFlagsInLatestCompositionByFederatedGraph(graphName: String!, namespace: String!): [FeatureFlag!]!

  """Returns feature subgraphs for a federated graph."""
  getFeatureSubgraphsByFederatedGraph(graphName: String!, namespace: String!): [Subgraph!]!

  """Returns subgraph members (admins)."""
  getSubgraphMembers(subgraphName: String!, namespace: String!): [OrgMember!]!

  """Returns operation override settings for a check."""
  getOperationOverrides(checkId: String!, operationHash: String!): [OperationOverride!]!

  """Returns all overrides for operations in a namespace."""
  getAllOverrides(namespace: String!, graphName: String!): [OperationOverride!]!

  """Returns cache warmer operations for a federated graph."""
  getCacheWarmerOperations(graphName: String!, namespace: String!): [CacheWarmerOperation!]!

  """Returns cache warmer configuration for a federated graph."""
  getCacheWarmerConfig(graphName: String!, namespace: String!): CacheWarmerConfig

  """Returns users accessible resources."""
  getUserAccessibleResources: UserAccessibleResources!

  """Returns routers registered for the organization."""
  getRouters: [Router!]!

  """Returns pending invitations for the authenticated user."""
  getInvitations: [OrgInvitation!]!

  """Returns namespace lint configuration."""
  getNamespaceLintConfig(namespace: String!): [LintRule!]!

  """Returns namespace schema checks configuration."""
  getNamespaceChecksConfig(namespace: String!): NamespaceChecksConfig

  """Returns namespace graph pruning configuration."""
  getNamespaceGraphPruningConfig(namespace: String!): NamespaceGraphPruningConfig

  """Returns namespace proposal configuration."""
  getNamespaceProposalConfig(namespace: String!): NamespaceProposalConfig

  """Returns proposals for a federated graph."""
  getProposalsByFederatedGraph(graphName: String!, namespace: String!): [Proposal!]!

  """Returns a specific proposal."""
  getProposal(proposalId: String!): Proposal

  """Returns checks associated with a proposal."""
  getProposalChecks(proposalId: String!): [SchemaCheck!]!

  """Returns OIDC providers configured for the organization."""
  listOIDCProviders: [OIDCProvider!]!

  """Returns login methods for a namespace."""
  listNamespaceLoginMethods(namespace: String!): [LoginMethod!]!

  """Returns login methods for the organization."""
  getOrganizationLoginMethods: [LoginMethod!]!

  """Returns whether the GitHub App is installed."""
  isGitHubAppInstalled: Boolean!

  """Returns clients (registered clients for persisted operations)."""
  getClients(graphName: String!, namespace: String!): [Client!]!

  """Previews the impact of deleting a client."""
  previewDeleteClient(clientId: String!, graphName: String!, namespace: String!): PreviewDeleteClientResult!

  """Returns the router compatibility versions available."""
  listRouterCompatibilityVersions: [RouterCompatibilityVersion!]!

  """Returns the subgraph check extensions configuration."""
  getSubgraphCheckExtensionsConfig(namespace: String!): SubgraphCheckExtensionsConfig

  """Returns onboarding state for the organization."""
  getOnboarding: Onboarding

  """Returns accessible permissions for the current user."""
  getUserAccessiblePermissions: [String!]!

  """Returns workspace details."""
  getWorkspace: Workspace!
}

# ---------------------------------------------------------------------------
# Mutation
# ---------------------------------------------------------------------------

type Mutation {
  """Creates a namespace in the organization."""
  createNamespace(name: String!): MutationResult!

  """Deletes a namespace."""
  deleteNamespace(name: String!): MutationResult!

  """Renames a namespace."""
  renameNamespace(name: String!, newName: String!): MutationResult!

  """Creates a federated graph."""
  createFederatedGraph(
    name: String!
    namespace: String!
    routingUrl: String!
    labelMatchers: [String!]
    readme: String
    admissionWebhookURL: String
    admissionWebhookSecret: String
    disableResolvabilityValidation: Boolean
  ): CreateFederatedGraphResult!

  """Deletes a federated graph."""
  deleteFederatedGraph(name: String!, namespace: String!): MutationResult!

  """Updates a federated graph."""
  updateFederatedGraph(
    name: String!
    namespace: String!
    routingUrl: String
    labelMatchers: [String!]
    readme: String
    admissionWebhookURL: String
    admissionWebhookSecret: String
    disableResolvabilityValidation: Boolean
  ): MutationResult!

  """Creates a federated subgraph."""
  createFederatedSubgraph(
    name: String!
    namespace: String!
    routingUrl: String
    labels: [LabelInput!]
    subscriptionUrl: String
    subscriptionProtocol: String
    websocketSubprotocol: String
    readme: String
    type: SubgraphType
  ): MutationResult!

  """Publishes (pushes) the schema of a subgraph to the control plane."""
  publishFederatedSubgraph(
    name: String!
    namespace: String!
    schema: String!
    routingUrl: String
    labels: [LabelInput!]
    subscriptionUrl: String
    subscriptionProtocol: String
    websocketSubprotocol: String
    isFeatureSubgraph: Boolean
    baseSubgraphName: String
    disableResolvabilityValidation: Boolean
    type: SubgraphType
  ): PublishSubgraphResult!

  """Publishes schemas for multiple existing subgraphs in one request."""
  publishFederatedSubgraphs(
    namespace: String!
    subgraphs: [PublishSubgraphInput!]!
    disableResolvabilityValidation: Boolean
  ): PublishSubgraphResult!

  """Deletes a federated subgraph."""
  deleteFederatedSubgraph(name: String!, namespace: String!): MutationResult!

  """Updates a subgraph's routing URL, labels, subscription config, or readme."""
  updateSubgraph(
    name: String!
    namespace: String!
    routingUrl: String
    labels: [LabelInput!]
    subscriptionUrl: String
    subscriptionProtocol: String
    websocketSubprotocol: String
    readme: String
    disableResolvabilityValidation: Boolean
    unsetLabels: Boolean
  ): MutationResult!

