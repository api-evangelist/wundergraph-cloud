WunderGraph Cosmo Platform API — GraphQL SDL
Derived from proto/wg/cosmo/platform/v1/platform.proto
Source: https://github.com/wundergraph/cosmo/blob/main/proto/wg/cosmo/platform/v1/platform.proto
Endpoint: https://cosmo-cp.wundergraph.com
Authentication: Bearer API key via Authorization header
